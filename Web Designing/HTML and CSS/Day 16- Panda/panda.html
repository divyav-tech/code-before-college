<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda</title>
    <link rel="stylesheet" href="panda.css">
</head>
<body>
    <div class="container">
        <div class="panda">
            <div class="head">
                <div class="ears">
                    <div class="ear ear1 black"></div>
                    <div class="ear ear2 black"></div>
                </div>
                <div class="main-head white">
                    <div class="eyes">
                        <div class="eye eye1 black">
                            <div class="eye-light light1 white"></div>
                        </div>
                        <div class="eye eye2 black">
                            <div class="eye-light light2 white"></div>
                        </div>
                    </div>
                    <div class="nose black"></div>
                    <div class="blushes">
                        <div class="blush blush1"></div>
                        <div class="blush blush2"></div>
                    </div>
                    <div class="mouth">
                        <div class="smile-space white"></div>
                    <div class="smile black"></div>
                    </div>
                </div>
            </div>
            <div class="body">
                <div class="hands">
                    <div class="hand hand1 black"></div>
                    <div class="hand hand2 black"></div>
                </div>
                <div class="main-body white">
                    <div class="body-part black"></div>
                </div>
            </div>
        </div>
    </div>

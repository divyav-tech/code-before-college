<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adding Audios And Videos!!</title>
</head>

<body>
    <h2>HTML Tags Example</h2>
    <!--dropdown menu with option tags-->
    Choose an option: <br>
    <select>
        <option value="">OPTION 1</option>
        <option value="">OPTION 2</option>
        <option value="">OPTION 3</option>
        <option value="">OPTION 4</option>
    </select>
    <!--AUDIO TAGS-->
    <H3>Audio Example</H3>
    <audio controls src="Audio2.mp3"></audio>
    <!--Video tags-->
    <h3>Video example</h3>
    <video controls src="video2.mp4" height="350"></video>
    <marquee behavior="" direction="right"> <video src="video.mp4"> <br></video>
        this is a video with marquee</marquee>
</body>

</html>

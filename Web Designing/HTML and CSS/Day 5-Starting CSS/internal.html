<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>internal css</title>
    <style>
        body {
            background-color: rgb(110, 29, 29);
        }

        h1 {
            color: rgb(138, 116, 158);
            text-align: center;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        p {
            color: rgb(131, 131, 179);
            font-family: Cooper;
            font-size: large;
        }

        h3 {
            color: aquamarine;
        }

        ul {
            color: rgb(141, 182, 103);
            font-family: 'Courier New', Courier, monospace;
        }

        h2 {
            color: aqua;
            text-align: center;
        }

        marquee {
            background-color: beige;
            color: blueviolet;
        }
    </style>

</head>

<body>
    <h1>THIS IS AN INTERNAL CSS PRACTICE WORK.</h1>
    <p>This is a paragraph for practice.
        <br>
        This is practice work.
    </p>

    <h3>What I learned?</h3>
    <ul>
        <li>Basic html tags</li>
        <li>Tables</li>
        <li>video and audio insertion</li>
        <li>Forms</li>
        <li>Image insertion and link creation</li>
    </ul>
    <h2>This is the heading formatting.</h2>
    <marquee behavior="scroll" direction="left">A marquee for practice purposes.</marquee>
</body>

</html>

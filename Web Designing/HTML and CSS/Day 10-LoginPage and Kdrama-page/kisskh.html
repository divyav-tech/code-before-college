<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisskh</title>
    <link rel="stylesheet" href="kisskh.css">
</head>

<body>
    <header>
        <div id="navbar">
            <div id="logo" class="nav"></div>
            <div class="nav">Home</div>
            <div class="nav">Explore</div>
            <div class="nav">Video Library</div>
            <div class="nav">FQA</div>
            <div class="nav">Install App</div>
            <div class="nav">Bookmark</div>
            <div class="nav" id="search"><i class="fa-2x fa-solid fa-magnifying-glass"></i></div>
        </div>
    </header>
    <div class="main">
        <div class="content" id="left"><video src="bairan.mp4" controls loop></video></div> 
        <!-- Used Bairan song video because I couldn't get any kdrama one -->
        <div class="content" id="right">
            <div id="name">
                <h1>Phantom Lawyer</h1>
                <p>May 2,2026 <br>
                    Completed | Latest Update | South Korean</p>
            </div>
            <div id="icons">
                <div class="icon-box">
                    <i class="fa-solid fa-bookmark"></i>
                    <p>Bookmark</p>
                </div>
                <div class="icon-box">
                    <i class="fa-solid fa-share-nodes"></i>
                    <p>Share</p>
                </div>
                <div class="icon-box">
                    <i class="fa-solid fa-share"></i>
                    <p>Join</p>
                </div>
                <div class="icon-box">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <p>Report</p>
                </div>
            </div>
            <div id="box">
                <div>
                    <h1>Episode</h1>
                    <p>16 episodes</p>
                </div>
                <div>
                    <button>2026-Completed</button>
                </div>
            </div>
            <div id="description">See Description</div>

            <div class="episodes-row">
                <div class="episodes">1</div>
                <div class="episodes">2</div>
                <div class="episodes">3</div>
                <div class="episodes">4</div>
                <div class="episodes">5</div>
                <div class="episodes">6</div>
                <div class="episodes">7</div>
                <div class="episodes">8</div>
            </div>
            <div class="episodes-row">
                <div class="episodes">9</div>
                <div class="episodes">10</div>
                <div class="episodes">11</div>
                <div class="episodes">12</div>
                <div class="episodes">13</div>
                <div class="episodes">14</div>
                <div class="episodes">15</div>
                <div class="episodes">16</div>
            </div>

        </div>

    </div>
    <footer>&#169; 2026 Kisskh. All Rights Reserved.</footer>

    <script src="https://kit.fontawesome.com/78652ec636.js" crossorigin="anonymous"></script>
</body>

</html>

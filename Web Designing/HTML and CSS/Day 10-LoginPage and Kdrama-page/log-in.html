<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="log-in.css">
</head>
<body>
    <div class="container">
        <div class="image">
            <p class="hero-line1">You can easily</p>
            <p class="hero-line2">Get access to your personal hub for clarity and productivity</p>
        </div>
        <div class="main">
            <h1>Create An Account</h1>
            <p>Access your tasks, notes, projects antime ,anywhere- And keep everything flowing in one place.</p>
            <div class="email">
                <h2>Your Email:</h2>
                <input type="email" placeholder="eg. abc@gmail.com">
            </div>
            <div class="password">
                <h2>Password:</h2>
                <input type="password" placeholder="Enter Your Password">
            </div>

            <button>Get Started</button>
            <div class="continue-with">
            <p>-------or continue with----------</p>
            <div class="icons">
                <i class="fa-brands fa-google"></i>
                <i class="fa-brands fa-apple"></i>
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-x-twitter"></i>
            </div>
            </div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/78652ec636.js" crossorigin="anonymous"></script>
</body>
</html>
